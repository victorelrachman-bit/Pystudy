<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo-global.css">
    <title>PyStudy</title>
</head>
<body>
    <h1>PYSTUDY - Plataforma de gestão de estudos</h1>
    <h2>Estude com mais foco, estude com pystudy</h2>
    <form action="http://127.0.0.1:5000/cadastro" method="POST">
        <fieldset>
            <legend>Cadastro</legend>
            <label for="nome">Nome: </label>
            <input name="nome" required><br>
            <label for="senha">Senha: </label>
            <input type="password" name="senha" required>
            <input type="submit" value="Enviar">
        </fieldset>
    </form><br>
    <a href="index.html">Já tem cadastro? </a>
    <script src="js-cadastro.js"></script>
</body>
</html>
