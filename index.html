<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="front/css/estilo-global.css">
    <link rel="icon" type="png/img" href="icone.png">
    <title>PyStudy</title>
</head>
<body>
    <h1>PYSTUDY - Plataforma de gestão de estudos</h1>
    <h2>Estude com mais foco, estude com pystudy</h2>
    <div id="container">
        <h3>Entrar</h3>
        <form action="http://127.0.0.1:5000/login" method="POST">
            <label for="nome">Nome: </label>
            <input name="nome" type="text" required>
            <label for="senha">Senha: </label>
            <input type="password" name="senha" required>
            <input type="submit" value="Enviar">
        </form>
        <a href="cadastro.html">Não tem cadastro? </a>
    </div>
    <script src="front/js/js-index.js"></script>
</body>
</html>
